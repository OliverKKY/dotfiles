listen_on unix:/tmp/kitty-theme
allow_remote_control yes

# Load pywal colors when available.
include ~/.cache/wal/colors-kitty.conf

# Keep semantic terminal colors stable across wallpaper changes.
color1 #ef4444
color2 #22c55e
color9 #ef4444
color10 #22c55e

# Keep the terminal readable while letting Hyprland blur the wallpaper behind it.
background_opacity 0.70
