# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
source = ~/.config/hypr/monitors.conf

#####################
### LOOK AND FEEL ###
#####################

source = ~/.cache/wal/colors-hyprland.conf
source = ~/.config/hypr/lookfeel.conf

###################
### MY PROGRAMS ###
###################

source = ~/.config/hypr/programs.conf

#################
### AUTOSTART ###
#################

source = ~/.config/hypr/autostart.conf

#############################
### ENVIRONMENT VARIABLES ###
#############################

xwayland {
    force_zero_scaling = true
}
# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#############
### INPUT ###
#############

source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Keep the first four workspaces persistent on the main monitor.
workspace = 1, monitor:DP-4, default:true, persistent:true
workspace = 2, monitor:DP-4, persistent:true
workspace = 3, monitor:DP-4, persistent:true
workspace = 4, monitor:DP-4, persistent:true

# Additional main monitor workspaces up to 9 stay dynamic.

# Secondary monitor stays on its own dedicated workspace.
workspace = 10, monitor:DVI-D-1, default:true, persistent:true

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

windowrulev2 = float,title:^(Waybar GNOME Clock)$
windowrulev2 = noborder,title:^(Waybar GNOME Clock)$
windowrulev2 = noanim,title:^(Waybar GNOME Clock)$
windowrulev2 = float,title:^(Waybar GNOME Quick Settings)$
windowrulev2 = noborder,title:^(Waybar GNOME Quick Settings)$
windowrulev2 = noanim,title:^(Waybar GNOME Quick Settings)$

# Keep the Steam client UI floating at its app-defined size.
# This targets the client and helper/dialog windows, not launched games.
# windowrulev2 = float,class:^(steam)$
# windowrulev2 = center,class:^(steam)$
# windowrulev2 = float,class:^(steamwebhelper)$
# windowrulev2 = center,class:^(steamwebhelper)$

windowrulev2 = fullscreen,class:^steam_app_\d+$
windowrulev2 = monitor 1,class:^steam_app_\d+$

windowrulev2 = fullscreen,class:^(hl2_linux)$
windowrulev2 = fullscreen,class:^(tf_linux64)$


layerrule = blur,kitty
layerrule = blur,rofi
